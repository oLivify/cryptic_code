<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecretMessages</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Secret Messages</h1>

    <div class="input-container" style="display: flex; flex-direction: column; align-items: flex-start; gap: 6px; margin-bottom: 20px;">
        <span style="font-size: 1.5rem;">🔑</span>

        <div style="display: flex; width: 100%; gap: 8px;">
            <input
                type="text"
                id="key"
                placeholder="Enter Secret Key"
                style="margin: 0; flex: 1;"
            >


            
          <!--  <button
                onclick="generateRandomKey()"
                style="flex: 0 0 auto; padding: 0 14px;"
                title="Generate Random Key"
            >
                🔁
            </button> -->
        </div>
    </div>

    <div class="input-container" style="display: flex; flex-direction: column; align-items: flex-start; gap: 6px; margin-bottom: 20px;">
        <span style="font-size: 1.5rem;">💬</span>
        <textarea
            id="input"
            placeholder="Enter Message"
            style="margin: 0; width: 100%; box-sizing: border-box;"
        ></textarea>
    </div>

    <div class="buttons" style="display: flex; justify-content: center; gap: 10px; margin-bottom: 20px;">
        <button onclick="encryptMessage()">Encrypt</button>
        <button onclick="decryptMessage()">Decrypt</button>
        <button onclick="copyOutput()">Copy</button>
        <button onclick="pasteMessage()">Paste</button>
        <button onclick="clearAll()">Clear</button>
        
    </div>

    <div class="input-container" style="display: flex; flex-direction: column; align-items: flex-start; gap: 6px; margin-bottom: 20px;">
        <span style="font-size: 1.5rem;">🔒</span>
        <textarea
            id="output"
            readonly
            placeholder="Result"
            style="margin: 0; width: 100%; box-sizing: border-box;"
        ></textarea>
    </div>

<!-- <h2>Operation History</h2>

<div id="history"></div> -->


    <div id="successModal" class="modal hidden">

    <div id="decryptModal" class="modal hidden">


    <div class="modal-content">

        <h2>Decryption Complete</h2>

        <p>Your message has been decrypted successfully.</p>

        <textarea id="decryptModalOutput" readonly></textarea>

        <button onclick="copyDecrypted()">Copy Message</button>
        <button onclick="clearAll(); closeDecryptModal();">Clear</button>
        <button onclick="closeDecryptModal()">Close</button>

    </div>

    </div>    

    <div class="modal-content">

        <h2>Encryption Complete</h2>

        <p>Your message has been encrypted successfully.</p>
        <textarea id="modalOutput" readonly></textarea>
        <button onclick="copyOutput()"> Copy Message</button>
        <button onclick="shareMessage()"> Share</button>
        <button onclick="clearAll(); closeModal();">Clear</button>
        <button onclick="closeModal()">Close</button>

    </div>

</div>
    
</div>

<script src="script.js"></script>

    <div id="notification"></div>

</body>
</html>
