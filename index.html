<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecretMessages</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Secret Messages</h1>

    <div class="key-container" style="display: flex; align-items: center; gap: 8px; justify-content: center; margin-bottom: 15px;">
        <span style="font-size: 1.2rem;">🔑</span>
        <input
            type="text"
            id="key"
            placeholder="Enter Secret Key"
            style="margin-bottom: 0;" 
        >
    </div>

    <textarea
        id="input"
        placeholder="Enter Message"
    ></textarea>

    <div class="buttons">
        <button onclick="encryptMessage()">
            Encrypt
        </button>

        <button onclick="decryptMessage()">
            Decrypt
        </button>

        <button onclick="clearAll()">
            Clear
        </button>
    </div>

    <textarea
        id="output"
        readonly
        placeholder="Result"
    ></textarea>

    <button onclick="copyOutput()">
        Copy Result
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
