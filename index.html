<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecretMessages</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Secret Messages</h1>

    <div class="input-container">
        <span>🔑</span>
        <input type="text" id="key" placeholder="Enter Secret Key">
    </div>

    <div class="input-container">
        <span>💬</span>
        <textarea id="input" placeholder="Enter Message"></textarea>
    </div>

    <div class="buttons">
        <button onclick="encryptMessage()">Encrypt</button>
        <button onclick="decryptMessage()">Decrypt</button>
        <button onclick="clearAll()">Clear</button>
    </div>

    <div class="input-container">
        <span>🔒</span>
        <textarea id="output" readonly placeholder="Result"></textarea>
    </div>

    <button onclick="copyOutput()">Copy Result</button>

</div>

<script src="script.js"></script>

</body>
</html>
