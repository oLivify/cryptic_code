<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecretMessages</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Secret Messages</h1>

    <div class="input-container" style="display: flex; flex-direction: column; align-items: flex-start; gap: 6px; margin-bottom: 20px;">
        <span style="font-size: 1.5rem;">🔑</span>
        <input
            type="text"
            id="key"
            placeholder="Enter Secret Key"
            style="margin: 0; width: 100%; box-sizing: border-box;" 
        >
    </div>

    <div class="input-container" style="display: flex; flex-direction: column; align-items: flex-start; gap: 6px; margin-bottom: 20px;">
        <span style="font-size: 1.5rem;">💬</span>
        <textarea
            id="input"
            placeholder="Enter Message"
            style="margin: 0; width: 100%; box-sizing: border-box;"
        ></textarea>
    </div>

    <div class="buttons" style="display: flex; justify-content: center; gap: 10px; margin-bottom: 20px;">
        <button onclick="encryptMessage()">Encrypt</button>
        <button onclick="decryptMessage()">Decrypt</button>
        <button onclick="clearAll()">Clear</button>
    </div>

    <div class="input-container" style="display: flex; flex-direction: column; align-items: flex-start; gap: 6px; margin-bottom: 20px;">
        <span style="font-size: 1.5rem;">🔒</span>
        <textarea
            id="output"
            readonly
            placeholder="Result"
            style="margin: 0; width: 100%; box-sizing: border-box;"
        ></textarea>
    </div>

    <div style="text-align: center;">
        <button onclick="copyOutput()">
            Copy Result
        </button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
